<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Starter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">GitHub Pages Starter</p>
        <h1>Build from your Figma design</h1>
        <p class="subhead">
          Lightweight scaffold with simple structure, editable styles, and a live preview block.
        </p>
      </header>

      <section class="card">
        <label for="titleInput">What are you building?</label>
        <div class="controls">
          <input id="titleInput" type="text" placeholder="My product landing page" />
          <button id="updateButton" type="button">Update preview</button>
        </div>
      </section>

      <section class="card preview">
        <p class="preview-label">Preview</p>
        <h2 id="previewTitle">My product landing page</h2>
        <p class="preview-copy">Start editing this text in <code>index.html</code> or <code>app.js</code>.</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
